name: Main

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate-js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Script Syntax
        run: node --check jsx-defender-001.js
